<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Sphere Area & Volume Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../icns/pi.svg">
    <script type="text/javascript">
      function keisan() {
        input.ans.value = (4 * Math.pow(input.hankei.value, 2)) + " πcm2";
      }
      function keisan2() {
        input2.ans2.value = (4 * Math.pow(input2.hankei2.value, 3) / 3) + " πcm3";
      }
    </script>
  </head>
  <body>
    <header>
      <h1>Sphere Surface Area & Volume Calculator</h1>
      <p>Please enter in half-width digits.</p>
    </header>

    <div class="card">
      <h2>Surface Area</h2>
      <form method="get" name="input">
        <div class="input-row">
          <label for="hankei">Radius (cm)</label>
          <input type="number" id="hankei" name="x">
          <input type="button" name="button" class="btn" onclick="keisan()" value="Calculate">
        </div>
        <output id="ans" name="answer">–</output>
      </form>
    </div>

    <div class="card">
      <h2>Volume</h2>
      <form method="get" name="input2">
        <div class="input-row">
          <label for="hankei2">Radius (cm)</label>
          <input type="number" id="hankei2" name="x2">
          <input type="button" name="button" class="btn" onclick="keisan2()" value="Calculate">
        </div>
        <output id="ans2" name="answer2">–</output>
      </form>
    </div>

    <footer>
      <a href="index.html">日本語</a>
      <p class="version">V1.0.1</p>
    </footer>
  </body>
</html>
