<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>球体表面積&体積計算機</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../icns/pi.svg">
    <script type="text/javascript">
      function keisan() {
        input.ans.value = (4 * Math.pow(input.hankei.value, 2)) + " πcm2";
      }
      function keisan2() {
        input2.ans2.value = (4 * Math.pow(input2.hankei2.value, 3) / 3) + " πcm3";
      }
    </script>
  </head>
  <body>
    <header>
      <h1>球体表面積＆体積計算機</h1>
      <p>必ず半角数字で入力してください</p>
    </header>

    <div class="card">
      <h2>表面積</h2>
      <form method="get" name="input">
        <div class="input-row">
          <label for="hankei">半径 (cm)</label>
          <input type="number" id="hankei" name="x">
          <input type="button" name="button" class="btn" onclick="keisan()" value="計算">
        </div>
        <output id="ans" name="answer">–</output>
      </form>
    </div>

    <div class="card">
      <h2>体積</h2>
      <form method="get" name="input2">
        <div class="input-row">
          <label for="hankei2">半径 (cm)</label>
          <input type="number" id="hankei2" name="x2">
          <input type="button" name="button" class="btn" onclick="keisan2()" value="計算">
        </div>
        <output id="ans2" name="answer2">–</output>
      </form>
    </div>

    <footer>
      <a href="index-en.html">English</a>
      <p class="version">V1.0.1</p>
    </footer>
  </body>
</html>
