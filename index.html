<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koki — Tools</title>
  <link rel="icon" href="icns/fav.svg" />
  <style>
    :root {
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", "Helvetica Neue", sans-serif;
      --transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }

    [data-theme="dark"] {
      --bg:        #000;
      --text:      rgba(255,255,255,0.92);
      --text-sub:  rgba(255,255,255,0.45);
      --text-dim:  rgba(255,255,255,0.22);
      --border:    rgba(255,255,255,0.11);
      --border-hi: rgba(255,255,255,0.22);
      --glass-bg:  rgba(255,255,255,0.055);
      --glass-hi:  rgba(255,255,255,0.10);
      --accent:    #2997ff;
    }

    [data-theme="light"] {
      --bg:        #f2f2f7;
      --text:      rgba(0,0,0,0.88);
      --text-sub:  rgba(0,0,0,0.44);
      --text-dim:  rgba(0,0,0,0.22);
      --border:    rgba(0,0,0,0.08);
      --border-hi: rgba(0,0,0,0.15);
      --glass-bg:  rgba(255,255,255,0.58);
      --glass-hi:  rgba(255,255,255,0.80);
      --accent:    #0071e3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    /* Blobs */
    .mesh {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden;
      z-index: 0;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      animation: drift 18s ease-in-out infinite;
    }
    .blob:nth-child(1) {
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(41,151,255,.18) 0%, transparent 70%);
      top: -8%; left: -8%;
    }
    .blob:nth-child(2) {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(48,209,88,.12) 0%, transparent 70%);
      bottom: 0; right: -4%;
      animation-delay: -7s;
    }
    .blob:nth-child(3) {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(255,159,10,.09) 0%, transparent 70%);
      top: 48%; left: 44%;
      animation-delay: -14s;
    }
    [data-theme="light"] .blob:nth-child(1) {
      background: radial-gradient(circle, rgba(0,113,227,.11) 0%, transparent 70%);
    }
    [data-theme="light"] .blob:nth-child(2) {
      background: radial-gradient(circle, rgba(26,158,63,.08) 0%, transparent 70%);
    }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(28px,-18px) scale(1.04); }
      66%      { transform: translate(-18px,14px) scale(0.97); }
    }

    /* Main content */
    .container {
      position: relative; z-index: 1;
      text-align: center;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    /* Title */
    h1 {
      font-size: clamp(44px, 9vw, 76px);
      font-weight: 700;
      letter-spacing: -0.045em;
      line-height: 1.0;
      margin-bottom: 16px;
      background: linear-gradient(155deg,
        var(--text) 0%,
        rgba(41,151,255,.9) 52%,
        rgba(48,209,88,.8) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0;
      animation: fadeUp 0.65s ease forwards 0.1s;
    }
    [data-theme="light"] h1 {
      background: linear-gradient(155deg,
        rgba(0,0,0,.84) 0%,
        rgba(0,113,227,.9) 52%,
        rgba(26,158,63,.85) 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .sub {
      font-size: clamp(13px, 2vw, 15px);
      color: var(--text-sub);
      line-height: 1.7;
      margin-bottom: 44px;
      opacity: 0;
      animation: fadeUp 0.65s ease forwards 0.22s;
    }

    /* Tool grid */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: min(100%, 480px);
      opacity: 0;
      animation: fadeUp 0.65s ease forwards 0.34s;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 22px 10px;
      border-radius: 20px;
      text-decoration: none;
      color: var(--text);
      background: var(--glass-bg);
      backdrop-filter: saturate(180%) blur(28px);
      -webkit-backdrop-filter: saturate(180%) blur(28px);
      border: 1px solid var(--border);
      position: relative; overflow: hidden;
      transition: transform var(--transition), border-color .25s, background .25s;
    }
    .tool-btn::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
      pointer-events: none;
    }
    .tool-btn:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: var(--border-hi);
      background: var(--glass-hi);
    }
    .tool-btn:active {
      transform: scale(0.97);
    }
    .tool-btn img {
      width: 34px; height: 34px;
      object-fit: contain;
    }
    .tool-label {
      font-size: 12px; font-weight: 500;
      color: var(--text-sub); text-align: center; line-height: 1.3;
      transition: color .2s;
    }
    .tool-btn:hover .tool-label { color: var(--text); }

    /* Theme toggle */
    .toggle-btn {
      position: fixed;
      top: 20px; right: 20px;
      width: 30px; height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub);
      transition: background 0.2s, transform 0.2s;
      z-index: 100;
    }
    .toggle-btn:hover { background: var(--glass-hi); transform: scale(1.08); }

    [data-theme="light"]  .icon-moon { display: block; }
    [data-theme="light"]  .icon-sun  { display: none;  }
    [data-theme="dark"]   .icon-moon { display: none;  }
    [data-theme="dark"]   .icon-sun  { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::selection { background: rgba(41,151,255,0.28); }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 400px) {
      .tool-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .tool-btn { padding: 18px 8px; }
    }
  </style>
</head>
<body>

  <div class="mesh">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <!-- Theme toggle -->
  <button class="toggle-btn" id="themeBtn" aria-label="テーマ切替">
    <svg class="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
    <svg class="icon-moon" width="13" height="13" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
    </svg>
  </button>

  <div class="container">

    <h1>Tools.</h1>

    <p class="sub">ブラウザでそのまま使える小さなツール集</p>

    <div class="tool-grid">

      <a href="calc/index.html" class="tool-btn">
        <img src="icns/cal.svg" alt="" />
        <span class="tool-label">電卓</span>
      </a>

      <a href="talkingcalc/index.html" class="tool-btn">
        <img src="icns/tkcal.svg" alt="" />
        <span class="tool-label">読上げ電卓</span>
      </a>

      <a href="sphere/index.html" class="tool-btn">
        <img src="icns/pi.svg" alt="" />
        <span class="tool-label">球体表面積</span>
      </a>

      <a href="baseconv/index.html" class="tool-btn">
        <img src="icns/nbc.svg" alt="" />
        <span class="tool-label">n進変換機</span>
      </a>

      <a href="clock/index.html" class="tool-btn">
        <img src="icns/clc.svg" alt="" />
        <span class="tool-label">時計</span>
      </a>

      <a href="nengou/index.html" class="tool-btn">
        <img src="icns/nengo.svg" alt="" />
        <span class="tool-label">年号変換</span>
      </a>

      <a href="counter/index.html" class="tool-btn">
        <img src="icns/cnt.svg" alt="" />
        <span class="tool-label">カウンタ</span>
      </a>

    </div>
  </div>

  <script>
    const html = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');

    const saved = localStorage.getItem('theme');
    if (saved) {
      html.setAttribute('data-theme', saved);
    } else if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
      html.setAttribute('data-theme', 'light');
    }

    themeBtn.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeBtn.style.transform = 'scale(0.75) rotate(30deg)';
      setTimeout(() => themeBtn.style.transform = '', 260);
    });
  </script>

</body>
</html>
