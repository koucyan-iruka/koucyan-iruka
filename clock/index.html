<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../icns/clc.svg">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>とけい</title>
</head>
<body>
    <div class="clock-card">
        <div class="c-clock">
            <div class="c-clock__ticks"></div>
            <span class="c-clock__hour"><span class="c-clock__num"></span></span> <!-- 時（数字が針の代わり） -->
            <span class="c-clock__min"><span class="c-clock__num"></span></span> <!-- 分 -->
            <span class="c-clock__sec"><span class="c-clock__num"></span></span> <!-- 秒 -->
        </div>
    </div>
</body>
</html>
